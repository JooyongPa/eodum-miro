<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>어둠의 미로</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:'Courier New',monospace;touch-action:none;user-select:none;}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:6px;padding:8px;}
#hud{display:flex;gap:12px;font-size:13px;color:#666;width:100%;max-width:560px;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.hval{font-size:15px;font-weight:700;color:#eee;}
#timer-bar-wrap{width:100%;max-width:560px;display:flex;align-items:center;gap:8px;font-size:11px;color:#555;}
#timer-bar-bg{flex:1;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
#timer-bar{height:6px;border-radius:3px;background:#2a9;transition:width 0.1s linear,background 0.3s;}
#timer-label{min-width:36px;text-align:right;font-size:12px;font-weight:700;color:#eee;}
#hint-row{display:flex;gap:6px;align-items:center;font-size:12px;color:#555;width:100%;max-width:560px;}
.pip{width:11px;height:11px;border-radius:50%;background:#2a9;display:inline-block;margin-right:2px;}
.pip.off{background:#222;}
#kst{margin-left:auto;color:#f0c030;font-size:11px;}
#canvas-box{position:relative;border:1px solid #1a1a1a;border-radius:8px;overflow:hidden;background:#000;max-width:100%;}
#c,#flash{display:block;max-width:100%;}
#flash{position:absolute;top:0;left:0;pointer-events:none;}
#ov{position:absolute;inset:0;background:rgba(0,0,0,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#eee;padding:24px;overflow-y:auto;}
.game-title{font-size:26px;font-weight:700;letter-spacing:4px;color:#f0c030;text-shadow:0 0 20px rgba(240,192,48,0.35);}
.sub{font-size:12px;color:#555;text-align:center;line-height:1.9;}
.notice{font-size:11px;color:#f0c030;text-align:center;}
input.name-in{padding:10px 14px;border-radius:6px;border:1px solid #2a2a2a;background:#111;color:#eee;font-family:'Courier New',monospace;font-size:15px;text-align:center;width:260px;outline:none;transition:border-color 0.2s;}
input.name-in:focus{border-color:#f0c030;}
.btn{padding:12px 28px;background:#f0c030;color:#111;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace;transition:background 0.15s,transform 0.1s;}
.btn:hover{background:#ffd84d;}
.btn:active{transform:scale(0.97);}
.btn2{padding:8px 20px;background:#111;color:#777;border:1px solid #2a2a2a;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Courier New',monospace;transition:all 0.15s;}
.btn2:hover{background:#1a1a1a;color:#ccc;border-color:#444;}
#rk-panel{width:100%;max-width:560px;background:#0c0c0c;border:1px solid #1a1a1a;border-radius:8px;padding:12px 16px;font-size:12px;display:none;}
#rk-panel h3{font-size:12px;font-weight:600;color:#555;margin-bottom:8px;letter-spacing:2px;}
.rk-row{display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid #111;font-size:12px;}
.rk-row:last-child{border-bottom:none;}
.rk-medal{width:22px;text-align:center;}
.rk-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ddd;}
.rk-score{color:#f0c030;font-weight:700;}
.rk-lv{color:#444;margin-left:4px;}
.rk-date{color:#2a2a2a;margin-left:4px;font-size:10px;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>레벨 <span class="hval" id="hl">1</span></div>
    <div>점수 <span class="hval" id="hscore">0</span></div>
    <div id="kst-hud"></div>
  </div>
  <div id="timer-bar-wrap">
    <span>⏱</span>
    <div id="timer-bar-bg"><div id="timer-bar"></div></div>
    <span id="timer-label">90s</span>
  </div>
  <div id="hint-row">
    <span>💡힌트(H):</span><span id="pips"></span>
    <span id="kst"></span>
  </div>
  <div id="canvas-box">
    <canvas id="c"></canvas>
    <canvas id="flash"></canvas>
    <div id="ov">
      <div class="game-title">🔦 어둠의 미로</div>
      <div class="sub">WASD / 방향키 이동 &nbsp;|&nbsp; H키 힌트 사용<br>⏱ 제한 시간 안에 출구를 찾아라!</div>
      <div class="notice">레벨 올라갈수록 시야 좁아지고 시간도 줄어요<br>🗝️ 레벨 10부터 열쇠 수집 후 출구 개방!</div>
      <input class="name-in" id="nameIn" placeholder="이름 입력 (최대 20자)" maxlength="20"/>
      <button class="btn" id="sb">시작하기</button>
      <button class="btn2" id="rkBtn">🏆 글로벌 랭킹 보기</button>
    </div>
  </div>
  <div id="rk-panel">
    <h3>🏆 어둠의 미로 — GLOBAL TOP 10</h3>
    <div id="rk-list"><div style="color:#333;padding:4px 0;">불러오는 중...</div></div>
  </div>
</div>

<script>
const SUPA_URL='https://gmfbmrlngnfohuapfzvl.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZmJtcmxuZ25mb2h1YXBmenZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzM4MzUsImV4cCI6MjA5MjMwOTgzNX0.1Lt21VKbRPV0nXgTnbsrG9Ewllgy9RqmKb-aVEGFJSs';
const TABLE='maze_scores';

async function sbInsert(body){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/${TABLE}`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(body)
    });
    return r.ok;
  }catch(e){return false;}
}
async function sbSelect(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/${TABLE}?select=nickname,score,level,created_at&order=score.desc&limit=10`,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(!r.ok)return null;
    return r.json();
  }catch(e){return null;}
}
async function loadRanking(){
  const el=document.getElementById('rk-list');
  el.innerHTML='<div style="color:#333;padding:4px 0;">불러오는 중...</div>';
  const data=await sbSelect();
  const medals=['🥇','🥈','🥉'];
  if(!data||data.length===0){el.innerHTML='<div style="color:#333;padding:4px 0;">아직 기록 없음</div>';return;}
  el.innerHTML=data.map((e,i)=>{
    const d=e.created_at?new Date(e.created_at).toLocaleDateString('ko'):'';
    return `<div class="rk-row">
      <span class="rk-medal">${medals[i]||`${i+1}.`}</span>
      <span class="rk-name">${e.nickname||'익명'}</span>
      <span class="rk-score">${e.score}점</span>
      <span class="rk-lv">Lv.${e.level}</span>
      <span class="rk-date">${d}</span>
    </div>`;
  }).join('');
}

const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const fc=document.getElementById('flash');
const fx=fc.getContext('2d');
const CELL=26;

let cols,rows,maze,px,py,ex,ey;
let level=1,running=false,startTime=0,raf=null;
let hints=0,hintActive=false,hintEnd=0,flashStartTime=0;
let needKey=false,keyX,keyY,hasKey=false;
let playerName='플레이어',sessionScore=0,maxLevel=1;
let timeLimit=90, timePct=1;

// 레벨별 제한 시간: 레벨 올라갈수록 짧아지고 미로 크기도 반영
function getTimeLimit(lvl){
  const mazeSize=9+(lvl-1)*2; // 미로 셀 수
  const base=90-(lvl-1)*4;    // 레벨1=90s, 레벨10=54s
  const sizeBonus=mazeSize*0.8; // 미로 클수록 조금 더 줌
  return Math.max(25, Math.round(base+sizeBonus*0.5));
}

function mkMaze(w,h){
  const m=Array.from({length:h},()=>Array(w).fill(1));
  function carve(x,y){
    const d=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5);
    for(const[dx,dy]of d){
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<w-1&&ny>0&&ny<h-1&&m[ny][nx]===1){
        m[ny-dy/2][nx-dx/2]=0;m[ny][nx]=0;carve(nx,ny);
      }
    }
  }
  m[1][1]=0;carve(1,1);m[h-2][w-2]=0;
  return m;
}

function randEmpty(excl){
  const c=[];
  for(let y=1;y<rows-1;y++)for(let x=1;x<cols-1;x++)
    if(maze[y][x]===0&&!excl.some(e=>e&&e[0]===x&&e[1]===y))c.push([x,y]);
  return c[Math.floor(Math.random()*c.length)];
}

function fitCanvas(){
  const maxW=Math.min(window.innerWidth-20,560);
  const maxH=Math.min(window.innerHeight-180,560);
  const size=Math.min(maxW,maxH);
  cv.style.width=fc.style.width=size+'px';
  cv.style.height=fc.style.height=size+'px';
}

function vr(extra){return Math.max(2.5,5.5-(level-1)*0.28)+(extra?2.6:0);}

function updatePips(){
  document.getElementById('pips').innerHTML=
    Array.from({length:3},(_,i)=>`<span class="pip${i<hints?'':' off'}"></span>`).join('');
}

function updateTimerBar(elapsed){
  const remain=Math.max(0,timeLimit-elapsed);
  timePct=remain/timeLimit;
  const bar=document.getElementById('timer-bar');
  const label=document.getElementById('timer-label');
  bar.style.width=(timePct*100)+'%';
  // 색상: 넉넉=초록, 절반=노랑, 위험=빨강
  if(timePct>0.5)bar.style.background='#2a9';
  else if(timePct>0.25)bar.style.background='#f0c030';
  else bar.style.background='#c44';
  label.textContent=Math.ceil(remain)+'s';
  label.style.color=timePct<=0.25?'#c44':timePct<=0.5?'#f0c030':'#eee';
  if(remain<=0&&running)timeOver();
}

function triggerFlash(){flashStartTime=performance.now();}
function drawFlash(now){
  fc.width=cv.width;fc.height=cv.height;
  fx.clearRect(0,0,fc.width,fc.height);
  if(!hintActive||now>=hintEnd)return;
  const elapsed=now-flashStartTime,remain=hintEnd-now,FADE=500;
  let a;
  if(elapsed<FADE)a=(elapsed/FADE)*0.26;
  else if(remain>FADE)a=0.26;
  else a=0.26*(remain/FADE);
  fx.fillStyle=`rgba(255,210,70,${Math.max(0,a)})`;
  fx.fillRect(0,0,fc.width,fc.height);
}

function startLevel(lvl){
  level=lvl;maxLevel=Math.max(maxLevel,lvl);
  const sz=9+(lvl-1)*2;
  cols=sz%2===0?sz+1:sz;rows=cols;
  cv.width=cols*CELL;cv.height=rows*CELL;
  fc.width=cols*CELL;fc.height=rows*CELL;
  fitCanvas();
  maze=mkMaze(cols,rows);
  px=1;py=1;ex=cols-2;ey=rows-2;
  maze._hint=randEmpty([[1,1],[cols-2,rows-2]]);
  needKey=(lvl>=10);hasKey=false;
  timeLimit=getTimeLimit(lvl);
  if(needKey){
    const kp=randEmpty([[1,1],[cols-2,rows-2],maze._hint||[]]);
    keyX=kp[0];keyY=kp[1];
    document.getElementById('kst').textContent='🗝️ 열쇠를 찾아라!';
  }else document.getElementById('kst').textContent='';
  hintActive=false;hintEnd=0;
  startTime=performance.now();running=true;
  document.getElementById('hl').textContent=lvl;
  document.getElementById('ov').style.display='none';
  updatePips();
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function draw(now){
  cx.fillStyle='#000';cx.fillRect(0,0,cv.width,cv.height);
  const active=hintActive&&now<hintEnd;
  if(hintActive&&!active)hintActive=false;
  const pcx=px*CELL+CELL/2,pcy=py*CELL+CELL/2;
  const v=vr(active);

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const ccx=x*CELL+CELL/2,ccy=y*CELL+CELL/2;
      const d=Math.sqrt((ccx-pcx)**2+(ccy-pcy)**2)/CELL;
      if(d>v+0.5)continue;
      const b=Math.max(0,1-d/v);
      if(maze[y][x]===1){const g=Math.floor(40*b+5);cx.fillStyle=`rgb(${g},${g},${g+10})`;}
      else cx.fillStyle=`rgb(${Math.floor(14*b+2)},${Math.floor(55*b+6)},${Math.floor(24*b+2)})`;
      cx.fillRect(x*CELL,y*CELL,CELL,CELL);
    }
  }

  // 힌트 아이템
  const hp=maze._hint;
  if(hp){
    const hd=Math.sqrt((hp[0]-px)**2+(hp[1]-py)**2);
    if(hd<=v+0.5){
      const hb=Math.max(0,1-hd/v),pulse=0.6+0.4*Math.sin(now/300);
      cx.fillStyle=`rgba(80,200,255,${hb*pulse})`;
      cx.fillRect(hp[0]*CELL+4,hp[1]*CELL+4,CELL-8,CELL-8);
      cx.font=`${CELL-6}px serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('💡',hp[0]*CELL+CELL/2,hp[1]*CELL+CELL/2);
    }
  }

  // 열쇠
  if(needKey&&!hasKey){
    const kd=Math.sqrt((keyX-px)**2+(keyY-py)**2);
    if(kd<=v+0.5){
      const kb=Math.max(0,1-kd/v),pulse=0.6+0.4*Math.sin(now/250);
      cx.fillStyle=`rgba(255,210,0,${kb*pulse})`;
      cx.fillRect(keyX*CELL+4,keyY*CELL+4,CELL-8,CELL-8);
      cx.font=`${CELL-6}px serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('🗝️',keyX*CELL+CELL/2,keyY*CELL+CELL/2);
    }
  }

  // 출구
  const ed=Math.sqrt((ex-px)**2+(ey-py)**2);
  if(ed<=v+0.5){
    const eb=Math.max(0,1-ed/v),pulse=0.55+0.45*Math.sin(now/200);
    const locked=needKey&&!hasKey;
    cx.fillStyle=locked?`rgba(180,60,60,${eb*pulse})`:`rgba(255,200,0,${eb*pulse})`;
    cx.fillRect(ex*CELL+3,ey*CELL+3,CELL-6,CELL-6);
    cx.font=`bold ${CELL-8}px monospace`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle=locked?`rgba(255,100,100,${eb})`:`rgba(255,235,0,${eb})`;
    cx.fillText(locked?'🔒':'★',ex*CELL+CELL/2,ey*CELL+CELL/2);
  }

  // 시간 얼마 안 남으면 화면 붉게 깜빡
  if(timePct<=0.25){
    const flicker=0.08+0.08*Math.sin(now/120);
    cx.fillStyle=`rgba(180,0,0,${flicker})`;
    cx.fillRect(0,0,cv.width,cv.height);
  }

  // 횃불
  const tg=cx.createRadialGradient(pcx,pcy,0,pcx,pcy,v*CELL);
  tg.addColorStop(0,'rgba(255,200,80,0.10)');tg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=tg;cx.fillRect(0,0,cv.width,cv.height);

  // 플레이어
  cx.fillStyle='#ddeeff';
  cx.beginPath();cx.arc(pcx,pcy,CELL*0.28,0,Math.PI*2);cx.fill();

  // 힌트 타이머
  if(active){
    const rem=Math.max(0,(hintEnd-now)/1000).toFixed(1);
    cx.fillStyle='rgba(120,220,255,0.9)';
    cx.font='bold 12px monospace';cx.textAlign='left';cx.textBaseline='top';
    cx.fillText(`💡 ${rem}s`,5,5);
  }

  drawFlash(now);
}

function loop(){
  if(!running)return;
  const now=performance.now();
  const elapsed=(now-startTime)/1000;
  updateTimerBar(elapsed);
  draw(now);
  raf=requestAnimationFrame(loop);
}

function useHint(){
  if(!running||hints<=0||hintActive)return;
  hints--;updatePips();
  hintActive=true;hintEnd=performance.now()+4000;
  triggerFlash();
}

function calcScore(lvl,remain){
  // 남은 시간 많을수록 보너스
  return Math.floor(remain*10)+lvl*100;
}

function move(dx,dy){
  if(!running)return;
  const nx=px+dx,ny=py+dy;
  if(nx<0||ny<0||nx>=cols||ny>=rows||maze[ny][nx]===1)return;
  px=nx;py=ny;
  const hp=maze._hint;
  if(hp&&px===hp[0]&&py===hp[1]&&hints<3){hints=Math.min(3,hints+1);maze._hint=null;updatePips();}
  if(needKey&&!hasKey&&px===keyX&&py===keyY){hasKey=true;document.getElementById('kst').textContent='🔓 출구 개방!';}
  if(px===ex&&py===ey){if(needKey&&!hasKey)return;levelClear();}
}

function showOv(html){const ov=document.getElementById('ov');ov.innerHTML=html;ov.style.display='flex';}

function levelClear(){
  running=false;
  const elapsed=(performance.now()-startTime)/1000;
  const remain=Math.max(0,timeLimit-elapsed);
  const sc=calcScore(level,remain);
  sessionScore+=sc;
  document.getElementById('hscore').textContent=sessionScore;
  showOv(`
    <div style="font-size:22px;">✅ 탈출 성공!</div>
    <div style="color:#f0c030;font-size:16px;">+${sc}점 &nbsp;|&nbsp; 누적 ${sessionScore}점</div>
    <div style="font-size:12px;color:#555;">남은 시간: ${remain.toFixed(1)}s &nbsp; 레벨 ${level} 클리어!</div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn" id="nb">레벨 ${level+1} →</button>
      <button class="btn2" id="rb">다시하기</button>
    </div>
    <button class="btn2" id="qb" style="margin-top:4px;">🏆 기록 저장 &amp; 종료</button>
  `);
  document.getElementById('nb').onclick=()=>startLevel(level+1);
  document.getElementById('rb').onclick=()=>startLevel(level);
  document.getElementById('qb').onclick=endGame;
}

function timeOver(){
  running=false;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  showOv(`
    <div style="font-size:32px;">⏰</div>
    <div style="font-size:22px;color:#c44;">시간 초과!</div>
    <div style="font-size:13px;color:#666;">레벨 ${level}에서 시간이 다 됐어요</div>
    <div style="font-size:15px;color:#ccc;margin-top:4px;">누적 점수: <span style="color:#f0c030;">${sessionScore}점</span></div>
    <div style="display:flex;gap:10px;margin-top:10px;">
      <button class="btn" id="to-retry">이 레벨 다시</button>
      <button class="btn2" id="to-save">🏆 저장 &amp; 종료</button>
    </div>
  `);
  document.getElementById('to-retry').onclick=()=>startLevel(level);
  document.getElementById('to-save').onclick=endGame;
}

async function endGame(){
  showOv(`<div style="font-size:18px;color:#444;">저장 중...</div>`);
  const ok=await sbInsert({nickname:playerName,score:sessionScore,level:maxLevel});
  await loadRanking();
  document.getElementById('rk-panel').style.display='block';
  showOv(`
    <div style="font-size:22px;">🏆 게임 종료!</div>
    <div style="color:#f0c030;font-size:18px;letter-spacing:1px;">${playerName}</div>
    <div style="font-size:15px;color:#ccc;">최종 ${sessionScore}점 &nbsp;|&nbsp; 최고 레벨 ${maxLevel}</div>
    <div style="font-size:12px;color:${ok?'#2a9':'#c44'};margin-top:2px;">${ok?'✅ 랭킹 저장 완료!':'⚠️ 저장 실패'}</div>
    <button class="btn" id="restartBtn" style="margin-top:10px;">다시 시작</button>
  `);
  document.getElementById('restartBtn').onclick=resetToStart;
}

function resetToStart(){
  sessionScore=0;maxLevel=1;hints=1;updatePips();
  document.getElementById('rk-panel').style.display='none';
  showOv(`
    <div class="game-title">🔦 어둠의 미로</div>
    <div class="sub">WASD / 방향키 이동 &nbsp;|&nbsp; H키 힌트<br>⏱ 제한 시간 안에 출구를 찾아라!</div>
    <div class="notice">레벨 올라갈수록 시야 좁아지고 시간도 줄어요<br>🗝️ 레벨 10부터 열쇠 수집 후 출구 개방!</div>
    <input class="name-in" id="nameIn2" placeholder="이름 입력 (최대 20자)" maxlength="20" value="${playerName}"/>
    <button class="btn" id="sb2">시작하기</button>
    <button class="btn2" id="rkBtn2">🏆 글로벌 랭킹 보기</button>
  `);
  document.getElementById('sb2').onclick=()=>{
    playerName=document.getElementById('nameIn2').value.trim()||'플레이어';
    hints=1;updatePips();startLevel(1);
  };
  document.getElementById('rkBtn2').onclick=async()=>{
    const rp=document.getElementById('rk-panel');
    if(rp.style.display==='none'||!rp.style.display){await loadRanking();rp.style.display='block';}
    else rp.style.display='none';
  };
}

document.getElementById('sb').onclick=()=>{
  playerName=document.getElementById('nameIn').value.trim()||'플레이어';
  sessionScore=0;maxLevel=1;hints=1;updatePips();startLevel(1);
};
document.getElementById('rkBtn').onclick=async()=>{
  const rp=document.getElementById('rk-panel');
  if(rp.style.display==='none'||!rp.style.display){await loadRanking();rp.style.display='block';}
  else rp.style.display='none';
};

document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
  if(map[e.key]){e.preventDefault();move(...map[e.key]);}
  if(e.key==='h'||e.key==='H'){e.preventDefault();useHint();}
});

let t0=null;
document.addEventListener('touchstart',e=>{t0=e.touches[0];},{passive:true});
document.addEventListener('touchend',e=>{
  if(!t0)return;
  const t=e.changedTouches[0];
  const dx=t.clientX-t0.clientX,dy=t.clientY-t0.clientY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1,0);
  else move(0,dy>0?1:-1);
  t0=null;
},{passive:true});

window.addEventListener('resize',fitCanvas);
fitCanvas();
</script>
</body>
</html>
